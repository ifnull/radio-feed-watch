<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>radio-feed-watch</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="top">
    <div>
      <h1 id="brand">radio-feed-watch</h1>
      <p id="subtitle" class="muted"></p>
    </div>
    <div class="badges">
      <span id="mode-badge" class="badge"></span>
      <span id="status-badge" class="badge badge-live">connecting…</span>
    </div>
  </header>

  <main class="layout">
    <section class="panel map-panel">
      <div id="map"></div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Incidents</h2>
        <label class="filter">
          Source
          <select id="filter-source"><option value="">all</option></select>
        </label>
      </div>
      <div id="incidents" class="table-wrap"></div>
    </section>

    <section class="panel transcript-panel">
      <div class="panel-head"><h2>Live transcript</h2></div>
      <div id="transcripts" class="tail"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
